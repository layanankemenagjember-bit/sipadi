[[redirects]]
  from = "/*"
  to = "/sipadi_cloudflare.html"
  status = 200
  force = false

[[headers]]
  for = "/sipadi_app.v2.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://sipadi-worker.kemenagjember.workers.dev https://pub-cb38c139fc6248b0a2cd34173379ba58.r2.dev https://unpkg.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://dki.kemenag.go.id; worker-src blob:;"
